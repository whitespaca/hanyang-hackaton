services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        INSTALL_MODEL_DEPS: ${INSTALL_MODEL_DEPS:-false}
    environment:
      APP_ENV: production
      INFERENCE_MODE: ${INFERENCE_MODE:-mock}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.65}
    ports:
      - "8000:8000"
    volumes:
      - api-runtime:/app/runtime
      - ./apps/api/models:/app/models:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  api-runtime:
